<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Finger Painting</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app"></div>

  <!-- Hidden file input for background upload -->
  <input id="bg-upload-input" type="file" accept="image/*" hidden>

  <!-- Hidden anchor used to trigger downloads -->
  <a id="download-anchor" hidden></a>

  <!-- Core modules: simple namespace pattern, plain <script> so file:// works -->
  <script src="js/icons.js?v=2"></script>
  <script src="js/sounds.js?v=2"></script>

  <!-- Brushes self-register into FP.brushes -->
  <script src="js/brushes/marker.js?v=2"></script>
  <script src="js/brushes/watercolor.js?v=2"></script>
  <script src="js/brushes/crayon.js?v=2"></script>
  <script src="js/brushes/eraser.js?v=2"></script>

  <script src="js/storage.js?v=2"></script>
  <script src="js/layout.js?v=2"></script>
  <script src="js/dialogs.js?v=2"></script>
  <script src="js/canvas.js?v=2"></script>
  <script src="js/app.js?v=2"></script>
</body>
</html>
